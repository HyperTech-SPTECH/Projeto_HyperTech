<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>login HyperTech</title>
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>
  <div id="CampoEsquerda">
    <a href="index.html">
      <img src="./assets/logo.png" alt="">
    </a> 
    
    <h1>Faça login em sua conta</h1>
    <h2>
      Insira suas credenciais e clique <br />
      no botão para entrar
    </h2>
    <br />
    <div class="campo">
      <label>Email</label>
      <input type="text" id="ipt_email" placeholder="Ex: hypertech@gmail.com" />
    </div>
    
    <div class="campo">
      <label>Senha</label>
      <input type="password" id="ipt_senha" placeholder="**********" />
    </div>
    <h2>Os campos devem ser preenchidos.</h2>
    
    <button onclick="entrar()" id="br_entrar">Entrar</button>
    <a href="register.html">Se ainda não tem conta <br />
      Cadastre-se agora</a>
    </div>
    <div id="foto">
      <img src="./assets/background.png" alt="">
    </div>
  </body>
