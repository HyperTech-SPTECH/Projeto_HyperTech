<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css"> </head>

<body onload="resetSessao()">
    <div class="auth-recipiente">
        
        <div class="auth-lateral-esq">
            <div class="auth-caixa">
                <a href="index.html">
                    <img class="auth-logo" src="./assets/LogoComEscrita.png" alt="HyperTech Logo">
                </a> 
                
                <h1 class="auth-titulo">Faça login em sua conta</h1>
                <p class="auth-subtitulo">Insira suas credenciais e clique no botão para entrar</p>
                
                <div class="auth-formulario">
                    <div class="auth-grupo-input">
                        <label>Email</label>
                        <input type="text" id="email_input" value="seguradora@gmail.com" placeholder="Ex: hypertech@gmail.com" />
                    </div>
                    
                    <div class="auth-grupo-input">
                        <label>Senha</label>
                        <input type="password" id="senha_input" value="Abcd#1234" placeholder="**********" />
                    </div>
                </div>
                
                <p class="auth-mensagem" style="color: #3b82f6;">Os campos devem ser preenchidos.</p>
                
                <button class="auth-botao" onclick="entrar()" id="br_entrar">Entrar</button>
                
                <a class="auth-link" href="register.html">Se ainda não tem conta,<br />Cadastre-se agora</a>
            </div>
        </div>
        
        <div class="auth-lateral-dir">
            <h2 class="auth-frase-fixa">Para você focar apenas no que importa!</h2>
        </div>
        
    </div>
</body>
</html>


<script>


    function entrar() {
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;


        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
        
            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log("a")
                    console.log(JSON.stringify(json));
                    console.log("b")
                    sessionStorage.EMAIL_USUARIO = json[0].email;
                    sessionStorage.NOME_USUARIO = json[0].nome;
                    sessionStorage.ID_USUARIO = json[0].usuario_id;
                    sessionStorage.CARGO_USUARIO = json[0].cargo_id;
                    

                    setTimeout(function () {
                        window.location = "./home.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function resetSessao() {
        sessionStorage.clear()
    }
</script>
