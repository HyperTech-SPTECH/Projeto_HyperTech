<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css"> </head>

<body>
    <div class="auth-recipiente">
        
        <div class="auth-lateral-esq">
            <div class="auth-caixa">
                <a href="index.html">
                    <img class="auth-logo" src="./assets/LogoComEscrita.png" alt="HyperTech Logo">
                </a>
                
                <h1 class="auth-titulo">Crie sua conta</h1>
                
                <div class="auth-formulario">
                    <div class="auth-grupo-input">
                        <label>Nome</label>
                        <input type="text" id="input_nome" placeholder="Ex: Maria Antonia Oliveira">
                    </div>
                    
                    <div class="auth-grupo-input">
                        <label>CNPJ</label>
                        <input oninput="mascara()" type="text" id="input_cnpj" maxlength="18" placeholder="Ex. XX.XXX.XXX/0001-XX">
                    </div>
                    
                    <div class="auth-grupo-input">
                        <label>E-mail</label>
                        <input type="text" id="input_email" placeholder="Ex. hypertech@gmail.com">
                    </div>
                    
                    <div class="auth-grupo-input">
                        <label>Senha</label>
                        <input type="password" id="input_senha" maxlength="6" placeholder="******">
                    </div>
                    
                    <div class="auth-grupo-input">
                        <label>Confirmar senha</label>
                        <input type="password" id="input_confirmacao" maxlength="6" placeholder="******">
                    </div>
                </div>
                
                <div id="res" class="auth-mensagem" style="display: none;">Preencher todos os campos!</div>
                
                <button class="auth-botao" onclick="criar()">Cadastrar</button>
                <a class="auth-link" href="login.html">Já possui uma conta? <br />Faça login agora</a>
            </div>
        </div>

        <div class="auth-lateral-dir">
            <h2 class="auth-frase-fixa">Para você focar apenas no que importa!</h2>
        </div>
        
    </div>
    </body>
    </html>

    <script>
        function mascara() {
            var cnpj = document.getElementById('input_cnpj')
            if( cnpj.value.length == 2 ||  cnpj.value.length == 6){
                cnpj.value += "."
            }
            if(cnpj.value.length == 10){
                cnpj.value += "/"
            }
            if(cnpj.value.length == 15){
                cnpj.value += "-"
            }
        }
        
        function criar() {
            var nome = input_nome.value.trim();
            var cnpj = input_cnpj.value.trim();
            var email = input_email.value.trim();
            var senha = input_senha.value;
            var confirmacao = input_confirmacao.value;

            var mensagem = "";

            if (!(email.includes("@gmail.com") || email.includes("@sptech.school"))) {
                mensagem += "Email deve ser @gmail.com ou @sptech.school<br>";
            }

            var temLetra = false;
            var temNumero = false;
            var temEspecial = false;

            var letras = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (var i = 0; i < letras.length; i++) {
                if (senha.includes(letras[i])) {
                    temLetra = true;
                    break;
                }
            }

            var numeros = "0123456789";
            for (var i = 0; i < numeros.length; i++) {
                if (senha.includes(numeros[i])) {
                    temNumero = true;
                    break;
                }
            }

            var especiais = "!@#%";
            for (var i = 0; i < especiais.length; i++) {
                if (senha.includes(especiais[i])) {
                    temEspecial = true;
                    break;
                }
            }

            if (senha.length < 6) {
                mensagem += "Senha deve ter no mínimo 6 caracteres<br>";
            }

            if (!temLetra || !temNumero || !temEspecial) {
                mensagem += "Senha deve conter letras, números e caractere especial (! @ # %)<br>";
            }

            if (senha !== confirmacao) {
                mensagem += "Senhas não conferem<br>";
            }

            if (mensagem === "") {
                res.innerHTML = "Cadastro realizado com sucesso!";
                res.style.color = "green";
                res.style.display = "block";
            } else {
                res.innerHTML = mensagem;
                res.style.color = "red";
                res.style.display = "block";
            }

            
            fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                
                nomeServer: nome,
                emailServer: email,
                cnpjServer: cnpj,
                senhaServer: senha,
                
            }),
            })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {

                // mensagem_erro.innerHTML =
                //     "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                setTimeout(() => {
                    window.location = "login.html";
                }, "2000");

              
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });

            return false;
        }


    </script>
