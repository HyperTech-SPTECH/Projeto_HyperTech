<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HyperTech</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="js/dashboard.js" defer></script>
</head>
<body>
    <header>
        <img src="./assets/logo.png" alt="" onclick="sairTelaDashboard()">
        <h1>HyperTech</h1>
    </header>
    <section id="idTelaTotal">
        <aside id="idLeftBar">
            <nav id="idNavLeftBar">
                <div class="optionNav optionSelecioned" id="idOptionDashboard">
                    <img src="./assets/Quadro-Cinza.png" alt="">
                    <span>Dashboard</span>
                </div>
                <div class="optionNav" id="idOptionRotas">
                    <img src="./assets/Quadro-Cinza.png" alt="">
                    <span>Rotas</span>
                </div>
                <div class="optionNav" id="idOptionCadFunc">
                    <img src="./assets/Quadro-Cinza.png" alt="">
                    <span>Cadastrar Funcionário</span>
                </div>
            </nav>
        </aside>
        <main id="idConteudo">
            <section class="telaConteudo" id="idTelaDashboard">

            </section>
            <section class="telaConteudo" id="idTelaRotas" style="display: none;">

            </section>
            <section class="telaConteudo" id="idTelaCadFunc" style="display: none;">

            </section>
        </main>
    </section>
</body>
</html>
